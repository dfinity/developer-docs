# Per-glob content-type overrides for assets where mime_guess doesn't
# classify usefully. First-match-wins; specific rules must precede broader ones.

[[asset]]
match = "/*.md"
content_type = "text/markdown; charset=utf-8"

[[asset]]
match = "/llms.txt"
content_type = "text/plain; charset=utf-8"

[[asset]]
match = "/*.did"
content_type = "text/plain; charset=utf-8"

[[asset]]
match = "/*.sh"
content_type = "text/plain; charset=utf-8"
