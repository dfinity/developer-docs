<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="Gradient-Purple" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="6.01%" stop-color="#c772ef"/>
      <stop offset="100%" stop-color="#6a85f1"/>
    </linearGradient>

    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5f6368"/>
    </marker>

    <style>
      .node-bg { fill: #303134; stroke: #5f6368; stroke-width: 1; }

      .title { font-size: 22px; font-weight: 600; fill: url(#Gradient-Purple); text-anchor: middle; }
      .box-text { font-size: 16px; fill: #e8eaed; text-anchor: middle; font-weight: 500; dominant-baseline: middle; }

      .connector { fill: none; stroke: #5f6368; stroke-width: 1.5; marker-end: url(#arrow); }
    </style>
  </defs>


  <line x1="275" y1="55" x2="675" y2="55" stroke="url(#Gradient-Purple)" stroke-width="1.5"/>

  <path d="M 180 50 L 250 50" class="connector"/>

  <path d="M 450 50 L 510 50" class="connector"/>

  <path d="M 710 50 L 750 65" class="connector"/>

  <path d="M 710 145 L 750 130" class="connector"/>

  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="160" height="60" rx="4" class="node-bg"/>
    <text x="80" y="30" class="box-text">GuestOS image</text>
  </g>

  <g transform="translate(250, 20)">
    <rect x="0" y="0" width="200" height="60" rx="4" class="node-bg"/>
    <text x="100" y="20" class="box-text">AMD SEV-SNP</text>
    <text x="100" y="40" class="box-text">Launch Measurement</text>
  </g>

  <g transform="translate(510, 20)">
    <rect x="0" y="0" width="200" height="60" rx="4" class="node-bg"/>
    <text x="100" y="20" class="box-text">AMD SEV-SNP</text>
    <text x="100" y="40" class="box-text">Sealing Key</text>
  </g>

  <g transform="translate(510, 110)">
    <rect x="0" y="0" width="200" height="60" rx="4" class="node-bg"/>
    <text x="100" y="20" class="box-text">Partition specific</text>
    <text x="100" y="40" class="box-text">key material</text>
  </g>

  <g transform="translate(750, 65)">
    <rect x="0" y="0" width="180" height="60" rx="4" class="node-bg"/>
    <text x="90" y="20" class="box-text">LUKS</text>
    <text x="90" y="40" class="box-text">Encryption Key</text>
  </g>

</svg>