networks:
  - name: local
    mode: managed
    gateway:
      port: 0

canisters:
  - name: frontend
    build:
      steps:
        - type: pre-built
          url: https://github.com/dfinity/certified-assets/releases/download/snapshot-pr65-1a208a3/canister.wasm
          sha256: aaacb5c927deb57ebd1ec1108b22693b7622b2317ebf6f859f07b7b689aecf5b

    sync:
      steps:
        - type: script
          commands:
            - npm install
            - npm run build
        - type: plugin
          url: https://github.com/dfinity/certified-assets/releases/download/snapshot-pr65-1a208a3/plugin.wasm
          sha256: ed15b6ba780e6691c17432afdee537228eb2110f342914cb12e36b9ecfacd1d7
          dirs:
            - dist
          files:
            - assets.toml
